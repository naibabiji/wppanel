{{template "base" .}}
{{define "websites_new_content"}}
<div x-data="createWebsite()" x-init="init()">
    <h2 class="text-xl font-bold text-white mb-6">创建网站</h2>
    <div class="card max-w-2xl">
        <form @submit.prevent="submit">
            <div class="mb-4">
                <label class="label">网站类型</label>
                <div class="flex space-x-4 mt-1">
                    <label class="flex items-center space-x-2 cursor-pointer text-gray-300">
                        <input type="radio" x-model="siteType" value="wordpress" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                        <span>WordPress</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer text-gray-300">
                        <input type="radio" x-model="siteType" value="php" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                        <span>通用 PHP 网站</span>
                    </label>
                </div>
            </div>
            <div class="mb-4">
                <label class="label">主域名</label>
                <input type="text" x-model="domain" class="input-field" placeholder="example.com" required>
            </div>
            <div class="mb-4">
                <label class="label">附加域名（一行一个）</label>
                <textarea x-model="aliases" class="input-field" rows="3" placeholder="www.example.com"></textarea>
            </div>
            <div class="mb-4">
                <label class="label">数据库密码</label>
                <div class="flex space-x-2">
                    <input type="text" x-model="dbPassword" class="input-field flex-1" :placeholder="siteType === 'php' ? '请输入数据库密码' : '留空自动生成随机密码'" :required="siteType === 'php'">
                    <button type="button" @click="generatePassword()" class="btn-secondary" x-show="siteType !== 'php'">生成随机密码</button>
                </div>
                <p class="text-xs text-gray-500 mt-1" x-show="siteType === 'php'">通用 PHP 网站请自行设置并记录密码，遗忘后需通过详情页修改密码获取新密码。</p>
            </div>
            <div class="mb-4">
                <label class="label">网站到期时间（可选）</label>
                <input type="date" x-model="expiresAt" class="input-field">
                <p class="text-xs text-gray-500 mt-1">留空则永不到期。到期前14天/7天/1天通过告警邮件提醒。</p>
            </div>
            <div class="mb-6">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" x-model="sslEnabled" class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600 focus:ring-blue-500">
                    <span class="text-gray-300">同时申请免费 Let's Encrypt SSL 证书</span>
                </label>
            </div>

            <div x-show="siteType === 'wordpress'" class="mb-6 p-4 bg-gray-800/50 rounded-lg border border-gray-700">
                <h3 class="text-sm font-semibold text-gray-300 mb-3">WordPress 安装选项</h3>

                <label class="flex items-center space-x-2 cursor-pointer mb-3">
                    <input type="checkbox" x-model="cleanDefaults" class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600 focus:ring-blue-500">
                    <span class="text-gray-300 text-sm">自动清理默认插件（Akismet + Hello Dolly）</span>
                </label>

                <label class="flex items-center space-x-2 cursor-pointer mb-4">
                    <input type="checkbox" x-model="removeUnusedThemes" class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600 focus:ring-blue-500">
                    <span class="text-gray-300 text-sm">删除未使用的默认主题（Twenty Twenty-Four / Twenty Twenty-Three）</span>
                </label>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-xs text-gray-500 mb-2">安装主题</p>
                        <template x-for="t in enabledThemes" :key="t.id">
                            <label class="flex items-center space-x-2 cursor-pointer mb-1">
                                <input type="checkbox" :value="t.slug" x-model="installThemes" class="w-3.5 h-3.5 rounded border-gray-600 bg-gray-700 text-blue-600">
                                <span class="text-gray-300 text-xs" x-text="t.name"></span>
                            </label>
                        </template>
                        <p x-show="enabledThemes.length === 0" class="text-xs text-gray-600">暂无已启用的主题，去「扩展配置」添加</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 mb-2">安装插件</p>
                        <template x-for="p in enabledPlugins" :key="p.id">
                            <label class="flex items-center space-x-2 cursor-pointer mb-1">
                                <input type="checkbox" :value="p.slug" x-model="installPlugins" class="w-3.5 h-3.5 rounded border-gray-600 bg-gray-700 text-blue-600">
                                <span class="text-gray-300 text-xs" x-text="p.name"></span>
                            </label>
                        </template>
                        <p x-show="enabledPlugins.length === 0" class="text-xs text-gray-600">暂无已启用的插件，去「扩展配置」添加</p>
                    </div>
                </div>
            </div>

            <div x-show="error" class="mb-4 p-3 bg-red-900/50 border border-red-700 rounded-lg text-red-300 text-sm"
                 x-text="error"></div>
            <div x-show="success" class="mb-4 p-3 bg-green-900/50 border border-green-700 rounded-lg text-green-300 text-sm"
                 x-text="success"></div>

            <button type="submit" class="btn-primary" :disabled="loading || !domain">
                <span x-show="!loading">创建网站</span>
                <span x-show="loading">正在创建...</span>
            </button>
        </form>
    </div>
</div>

<script>
function createWebsite() {
    return {
        domain: '',
        aliases: '',
        dbPassword: '',
        sslEnabled: false,
        expiresAt: '',
        siteType: 'wordpress',
        cleanDefaults: true,
        removeUnusedThemes: true,
        extensions: [],
        installThemes: [],
        installPlugins: [],
        loading: false,
        error: '',
        success: '',
        init() {
            this.loadExtensions();
        },
        get enabledThemes() { return this.extensions.filter(e => e.etype === 'theme' && e.enabled); },
        get enabledPlugins() { return this.extensions.filter(e => e.etype === 'plugin' && e.enabled); },
        async loadExtensions() {
            try {
                const resp = await api('/extensions');
                if (resp.success) {
                    this.extensions = resp.data;
                    this.installThemes = resp.data.filter(e => e.etype === 'theme' && e.enabled).map(e => e.slug);
                    this.installPlugins = resp.data.filter(e => e.etype === 'plugin' && e.enabled).map(e => e.slug);
                }
            } catch(e) {}
        },
        generatePassword() {
            const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
            let pw = '';
            for (let i = 0; i < 24; i++) pw += chars[Math.floor(Math.random() * chars.length)];
            this.dbPassword = pw;
        },
        async submit() {
            this.loading = true;
            this.error = '';
            this.success = '';
            try {
                const aliasesList = this.aliases.split('\n').map(s => s.trim()).filter(Boolean);
                const body = {
                    domain: this.domain.trim(),
                    aliases: aliasesList,
                    db_password: this.dbPassword,
                    ssl_enabled: this.sslEnabled,
                    expires_at: this.expiresAt || null,
                    site_type: this.siteType
                };
                if (this.siteType === 'wordpress') {
                    body.clean_defaults = this.cleanDefaults;
                    body.remove_unused_themes = this.removeUnusedThemes;
                    body.install_themes = this.installThemes;
                    body.install_plugins = this.installPlugins;
                }
                const resp = await api('/websites', { method: 'POST', body });
                if (resp.success) {
                    this.success = '网站 ' + this.domain + ' 创建成功！';
                    this.domain = '';
                    this.aliases = '';
                    this.dbPassword = '';
                    this.sslEnabled = false;
                    setTimeout(() => { window.location.href = '/' + document.body.dataset.panelPrefix.replace('/', '') + '/websites'; }, 2000);
                }
            } catch (e) {
                this.error = e.message;
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
{{end}}
