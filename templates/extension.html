{{template "base" .}}
{{define "extensions_content"}}
<div x-data="extensionConfig()" x-init="load()">
    <h2 class="text-xl font-bold text-white mb-6">扩展配置</h2>
    <p class="text-gray-400 text-sm mb-6">新建 WordPress 网站时默认可选安装的主题和插件列表。已启用的项目将在建站页面中默认勾选。</p>

    <div class="flex space-x-2 mb-6">
        <button @click="reset()" class="btn-secondary text-sm">一键恢复默认配置</button>
    </div>

    <div x-show="message" class="mb-4 p-3 rounded-lg text-sm" :class="msgClass" x-text="message"></div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="card">
            <h3 class="text-lg font-semibold text-white mb-4">主题</h3>
            <table class="table-fixed w-full text-sm">
                <thead>
                    <tr class="text-left text-gray-400 border-b border-gray-700">
                        <th class="pb-2 w-1/3">Slug</th>
                        <th class="pb-2 w-1/3">名称</th>
                        <th class="pb-2 w-8 text-center">启用</th>
                        <th class="pb-2 w-8"></th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(e, i) in themes" :key="e.id || -i">
                        <tr class="border-b border-gray-800 text-gray-300">
                            <td class="py-2"><input type="text" x-model="e.slug" class="input-field text-xs py-1 w-full"></td>
                            <td class="py-2 px-1"><input type="text" x-model="e.name" class="input-field text-xs py-1 w-full"></td>
                            <td class="py-2 text-center"><input type="checkbox" x-model="e.enabled" class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600"></td>
                            <td class="py-2 text-center"><button @click="remove(themes, i)" class="text-red-400 hover:text-red-300 text-xs">删除</button></td>
                        </tr>
                    </template>
                </tbody>
            </table>
            <button @click="themes.push({id:0, etype:'theme', slug:'', name:'', enabled:true})" class="btn-secondary text-xs mt-3">+ 添加主题</button>
        </div>

        <div class="card">
            <h3 class="text-lg font-semibold text-white mb-4">插件</h3>
            <table class="table-fixed w-full text-sm">
                <thead>
                    <tr class="text-left text-gray-400 border-b border-gray-700">
                        <th class="pb-2 w-1/3">Slug</th>
                        <th class="pb-2 w-1/3">名称</th>
                        <th class="pb-2 w-8 text-center">启用</th>
                        <th class="pb-2 w-8"></th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(e, i) in plugins" :key="e.id || -i">
                        <tr class="border-b border-gray-800 text-gray-300">
                            <td class="py-2"><input type="text" x-model="e.slug" class="input-field text-xs py-1 w-full"></td>
                            <td class="py-2 px-1"><input type="text" x-model="e.name" class="input-field text-xs py-1 w-full"></td>
                            <td class="py-2 text-center"><input type="checkbox" x-model="e.enabled" class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600"></td>
                            <td class="py-2 text-center"><button @click="remove(plugins, i)" class="text-red-400 hover:text-red-300 text-xs">删除</button></td>
                        </tr>
                    </template>
                </tbody>
            </table>
            <button @click="plugins.push({id:0, etype:'plugin', slug:'', name:'', enabled:true})" class="btn-secondary text-xs mt-3">+ 添加插件</button>
        </div>
    </div>

    <button @click="save()" class="btn-primary mt-6">保存配置</button>
</div>

<script>
function extensionConfig() {
    return {
        themes: [],
        plugins: [],
        message: '',
        msgClass: '',
        async load() {
            try {
                const resp = await api('/extensions');
                if (resp.success) {
                    this.themes = resp.data.filter(e => e.etype === 'theme');
                    this.plugins = resp.data.filter(e => e.etype === 'plugin');
                }
            } catch(e) { this.showMsg(e.message, true); }
        },
        async remove(arr, i) {
            const item = arr[i];
            if (item && item.id > 0) {
                try { await api('/extensions/' + item.id, { method: 'DELETE' }); } catch(e) {}
            }
            arr.splice(i, 1);
        },
        async save() {
            const all = [...this.themes, ...this.plugins];
            try {
                const resp = await api('/extensions', { method: 'PUT', body: all });
                if (resp.success) { this.showMsg('已保存', false); await this.load(); }
            } catch(e) { this.showMsg(e.message, true); }
        },
        async reset() {
            if (!confirm('将恢复为默认主题和插件列表，当前配置将被覆盖。确认？')) return;
            try {
                const resp = await api('/extensions/reset', { method: 'POST' });
                if (resp.success) { this.showMsg('已恢复默认配置', false); await this.load(); }
            } catch(e) { this.showMsg(e.message, true); }
        },
        showMsg(msg, err) {
            this.message = msg;
            this.msgClass = err ? 'bg-red-900/50 border border-red-700 text-red-300' : 'bg-green-900/50 border border-green-700 text-green-300';
            setTimeout(() => { this.message = ''; }, 3000);
        }
    }
}
</script>
{{end}}
