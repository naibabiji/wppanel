{{template "base" .}}
{{define "websites_content"}}
<div x-data="websiteList()" x-init="fetchList()">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-white">网站管理</h2>
        <a href="/{{.RandomSuffix}}/websites/new" class="btn-primary">创建网站</a>
    </div>

    <!-- 重装 WordPress 对话框 -->
    <div x-show="reinstallModal.show" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60" @click.self="reinstallModal.show = false">
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-6 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
            <h3 class="text-lg font-bold text-white mb-2" x-text="'重装 WordPress — ' + (reinstallModal.site?.domain || '')"></h3>
            <p class="text-sm text-red-400 mb-4">⚠ 此操作将删除所有网站文件、清空数据库并重新部署全新 WordPress，所有数据不可恢复。</p>

            <label class="flex items-center space-x-2 cursor-pointer mb-3">
                <input type="checkbox" x-model="reinstallModal.cleanDefaults" class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600">
                <span class="text-gray-300 text-sm">自动清理默认插件（Akismet + Hello Dolly）</span>
            </label>

            <label class="flex items-center space-x-2 cursor-pointer mb-4">
                <input type="checkbox" x-model="reinstallModal.removeUnusedThemes" class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600">
                <span class="text-gray-300 text-sm">删除未使用的默认主题（Twenty Twenty-Four / Twenty Twenty-Three）</span>
            </label>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <p class="text-xs text-gray-500 mb-2">安装主题</p>
                    <template x-for="t in reinstallModal.extensions.filter(e => e.etype === 'theme' && e.enabled)" :key="t.id">
                        <label class="flex items-center space-x-2 cursor-pointer mb-1">
                            <input type="checkbox" :value="t.slug" x-model="reinstallModal.installThemes" class="w-3.5 h-3.5 rounded border-gray-600 bg-gray-700 text-blue-600">
                            <span class="text-gray-300 text-xs" x-text="t.name"></span>
                        </label>
                    </template>
                </div>
                <div>
                    <p class="text-xs text-gray-500 mb-2">安装插件</p>
                    <template x-for="p in reinstallModal.extensions.filter(e => e.etype === 'plugin' && e.enabled)" :key="p.id">
                        <label class="flex items-center space-x-2 cursor-pointer mb-1">
                            <input type="checkbox" :value="p.slug" x-model="reinstallModal.installPlugins" class="w-3.5 h-3.5 rounded border-gray-600 bg-gray-700 text-blue-600">
                            <span class="text-gray-300 text-xs" x-text="p.name"></span>
                        </label>
                    </template>
                </div>
            </div>

            <div class="flex justify-end space-x-3">
                <button @click="reinstallModal.show = false" class="btn-secondary text-sm">取消</button>
                <button @click="doReinstallWP()" class="text-sm py-2 px-4 rounded text-white" style="background-color: #7f1d1d;">确认重装</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="border-b border-gray-700">
                    <tr>
                        <th class="table-header">域名</th>
                        <th class="table-header">状态</th>
                        <th class="table-header">SSL</th>
                        <th class="table-header">监控</th>
                        <th class="table-header">缓存</th>
                        <th class="table-header">日志</th>
                        <th class="table-header">备份</th>
                        <th class="table-header">创建时间</th>
                        <th class="table-header">到期时间</th>
                        <th class="table-header">操作</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="site in websites" :key="site.id">
                        <tr class="border-b border-gray-700/50">
                            <td class="table-cell font-medium">
                                <a :href="'http://' + site.domain" target="_blank" class="text-blue-400 hover:text-blue-300 hover:underline" x-text="site.domain"></a>
                            </td>
                            <td class="table-cell">
                                <span :class="site.status === 'active' ? 'badge-success' : 'badge-warning'"
                                      x-text="site.status === 'active' ? '运行中' : '已暂停'"></span>
                            </td>
                            <td class="table-cell">
                                <span :class="site.ssl_enabled ? 'badge-success' : 'badge-info'"
                                      x-text="site.ssl_enabled ? '已启用' : '未启用'"></span>
                            </td>
                            <td class="table-cell">
                                <span :class="site.monitoring_enabled ? 'badge-success' : 'badge-info'"
                                      x-text="site.monitoring_enabled ? '已开启' : '未开启'"></span>
                            </td>
                            <td class="table-cell">
                                <span :class="site.fastcgi_cache_enabled ? 'badge-success' : 'badge-info'"
                                      x-text="site.fastcgi_cache_enabled ? '已开启' : '未开启'"></span>
                            </td>
                            <td class="table-cell">
                                <span :class="site.access_log_mode === 'full' ? 'badge-success' : site.access_log_mode === 'error_only' ? 'badge-warning' : 'badge-info'"
                                      x-text="site.access_log_mode === 'full' ? '全部' : site.access_log_mode === 'error_only' ? '仅异常' : '关闭'"></span>
                            </td>
                            <td class="table-cell">
                                <span :class="site.backup_enabled ? 'badge-success' : 'badge-info'"
                                      x-text="site.backup_enabled ? '已启用' : '未启用'"></span>
                            </td>
                            <td class="table-cell" x-text="new Date(site.created_at).toLocaleDateString('zh-CN')"></td>
                            <td class="table-cell text-xs" x-text="site.expires_at ? new Date(site.expires_at).toLocaleDateString('zh-CN') : '永不到期'"></td>
                            <td class="table-cell">
                                <div class="flex space-x-2">
                                    <a :href="'/{{$.RandomSuffix}}/websites/' + site.id" class="btn-secondary text-xs py-1 px-2">详情</a>
                                    <button @click="toggleStatus(site)" class="text-xs py-1 px-2 rounded"
                                            :class="site.status === 'active' ? 'btn-warning bg-yellow-700 hover:bg-yellow-600 text-white' : 'btn-success text-xs'"
                                            x-text="site.status === 'active' ? '暂停' : '启用'"></button>
                                    <button x-show="site.site_type === 'wordpress'" @click="reinstallWP(site)" :disabled="reinstallingId === site.id" class="text-xs py-1 px-2 rounded" style="background-color: #7f1d1d; color: #fca5a5;" x-text="reinstallingId === site.id ? '重装中...' : '重装'"></button>
                                    <button @click="deleteSite(site)" class="btn-danger text-xs py-1 px-2">删除</button>
                                </div>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="websites.length === 0">
                        <td colspan="10" class="table-cell text-center text-gray-500 py-8">暂无网站</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
function websiteList() {
    return {
        websites: [],
        reinstallingId: null,
        reinstallModal: {
            show: false,
            site: null,
            extensions: [],
            cleanDefaults: true,
            removeUnusedThemes: true,
            installThemes: [],
            installPlugins: [],
        },
        async fetchList() {
            try {
                const resp = await api('/websites');
                if (resp.success) this.websites = resp.data || [];
            } catch (e) { showToast(e.message, 'error'); }
        },
        async toggleStatus(site) {
            const action = site.status === 'active' ? 'pause' : 'enable';
            try {
                const resp = await api('/websites/' + site.id + '/status', { method: 'PATCH', body: { action } });
                if (resp.success) {
                    site.status = action === 'pause' ? 'paused' : 'active';
                    showToast(resp.message || '操作成功', 'success');
                }
            } catch (e) { showToast(e.message, 'error'); }
        },
        async reinstallWP(site) {
            this.reinstallModal.site = site;
            this.reinstallModal.cleanDefaults = true;
            this.reinstallModal.removeUnusedThemes = true;
            this.reinstallModal.installThemes = [];
            this.reinstallModal.installPlugins = [];
            this.reinstallModal.extensions = [];
            try {
                const resp = await api('/extensions');
                if (resp.success) this.reinstallModal.extensions = resp.data;
            } catch(e) {}
            this.reinstallModal.show = true;
        },
        async doReinstallWP() {
            const site = this.reinstallModal.site;
            this.reinstallModal.show = false;
            this.reinstallingId = site.id;
            showToast('正在重装 ' + site.domain + '，请稍候...', 'info');
            try {
                const body = {};
                if (site.site_type === 'wordpress') {
                    body.clean_defaults = this.reinstallModal.cleanDefaults;
                    body.remove_unused_themes = this.reinstallModal.removeUnusedThemes;
                    body.install_themes = this.reinstallModal.installThemes;
                    body.install_plugins = this.reinstallModal.installPlugins;
                }
                const resp = await api('/websites/' + site.id + '/reinstall-wp', { method: 'POST', body });
                if (resp.success) {
                    showToast(resp.data?.message || 'WordPress 重装完成', 'success');
                }
            } catch (e) { showToast(e.message, 'error'); }
            this.reinstallingId = null;
        },
        async deleteSite(site) {
            if (!await confirmModal('确认删除网站 ' + site.domain + '？此操作不可逆。')) return;
            try {
                const resp = await api('/websites/' + site.id, { method: 'DELETE' });
                if (resp.success) {
                    this.websites = this.websites.filter(s => s.id !== site.id);
                    showToast('网站已删除', 'success');
                }
            } catch (e) { showToast(e.message, 'error'); }
        }
    }
}
</script>
{{end}}
